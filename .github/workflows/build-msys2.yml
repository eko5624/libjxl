name: build-msys2
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: msys2/setup-msys2@v2
      with:
        update: true
        install: >-
          cmake
          doxygen
          git
          mingw-w64-x86_64-clang
          mingw-w64-x86_64-giflib
          mingw-w64-x86_64-libjpeg-turbo
          mingw-w64-x86_64-libpng
          mingw-w64-x86_64-gflags         
          ninja
#          mingw-w64-x86_64-brotli | -DJPEGXL_FORCE_SYSTEM_BROTLI=ON
#          mingw-w64-x86_64-graphviz
#          mingw-w64-x86_64-gtest

    - name: Checkout and Build
      shell: msys2 {0}
      run: |
        set -x
        export PATH=/mingw64/bin:$PATH
        git clone https://github.com/libjxl/libjxl.git --recursive --depth 1 --branch main
        cd libjxl
        BUILD_DIR=build SKIP_TEST=1 ./ci.sh release \
            -DBUILD_TESTING=OFF \
            -DJPEGXL_ENABLE_BENCHMARK=OFF \
            -DJPEGXL_ENABLE_DEVTOOLS=OFF \
            -DJPEGXL_ENABLE_EXAMPLES=OFF \
            -DJPEGXL_ENABLE_FUZZERS=OFF \
            -DJPEGXL_ENABLE_MANPAGES=OFF \
            -DJPEGXL_ENABLE_OPENEXR=OFF \
            -DJPEGXL_ENABLE_PLUGINS=OFF \
            -DJPEGXL_ENABLE_TCMALLOC=OFF \
            -DJPEGXL_ENABLE_VIEWERS=OFF \
            -DJPEGXL_STATIC=ON \
            -DJPEGXL_WARNINGS_AS_ERRORS=OFF
          
    
    - name: Get current timestamp      
      id: timestamp
      run: echo "::set-output name=date::$(date +%Y-%m-%d)"  
 
    - name: Upload artifacts
      uses: actions/upload-artifact@v2
      with:
        name: jxl-dev
        path: |
          build/*
 
    - name: Package release zip
      shell: 'powershell'
      run: |
        7z a jxl-dev.7z build/*
   
    - name: Upload
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: jxl*.7z
        tag: ${{ steps.timestamp.outputs.date }}
        overwrite: true
        file_glob: true
